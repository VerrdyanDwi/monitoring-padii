<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Padi</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; width: 350px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
        
        /* Kotak Status Utama */
        #status-box { height: 100px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: white; margin-bottom: 20px; transition: 0.5s; }
        
        /* Lingkaran Warna Sensor */
        .color-preview { width: 70px; height: 70px; border-radius: 50%; margin: 10px auto; border: 5px solid #eee; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); transition: 0.5s; }
        
        /* Label Warna */
        .label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        #sync-time { font-size: 10px; color: #bdc3c7; margin-top: 20px; }

        /* Variasi Warna Status */
        .f0 { background-color: #95a5a6; } /* Kosong */
        .f1 { background-color: #27ae60; } /* Vegetatif */
        .f2 { background-color: #2ecc71; } /* Reproduktif */
        .f3 { background-color: #f1c40f; color: #2c3e50 !important; } /* Pematangan */
        .ferr { background-color: #e74c3c; } /* Anomali */
    </style>
</head>
<body>

    <div class="card">
        <h2>Padi Tracker IoT</h2>
        
        <div id="status-box" class="f0">MENGHUBUNGKAN...</div>
        
        <p class="label">Warna Daun (Real-time)</p>
        <div id="color-circle" class="color-preview" style="background-color: #ddd;"></div>
        
        <div id="sync-time">Menunggu data terbaru...</div>
    </div>

<script>
    // --- KONFIGURASI INFLUXDB (SAMAKAN DENGAN PYTHON) ---
    const INFLUX = {
        url: "https://us-east-1-1.aws.cloud2.influxdata.com",
        token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
        org: "Monitoring",
        bucket: "monitoring_padi"
    };

    async function fetchData() {
        // Query Flux untuk mengambil data terakhir dari 24 jam terakhir
        const fluxQuery = `
            from(bucket: "${INFLUX.bucket}")
            |> range(start: -24h)
            |> filter(fn: (r) => r._measurement == "pertumbuhan_padi")
            |> last()
            |> pivot(rowKey:["_time"], columnKey: ["_field"], valueColumn: "_value")
        `;

        try {
            const response = await fetch(`${INFLUX.url}/api/v2/query?org=${INFLUX.org}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${INFLUX.token}`,
                    'Content-Type': 'application/vnd.flux',
                    'Accept': 'application/csv'
                },
                body: fluxQuery
            });

            const csvData = await response.text();
            const rows = d3.csvParse(csvData);

            if (rows.length > 0) {
                const latest = rows[0];
                updateDashboard(
                    parseInt(latest.kode_fase), 
                    parseInt(latest.r), 
                    parseInt(latest.g), 
                    parseInt(latest.b)
                );
            }
        } catch (error) {
            console.error("Gagal mengambil data:", error);
            document.getElementById("status-box").innerText = "ERROR KONEKSI";
        }
    }

    function updateDashboard(kode, r, g, b) {
        const box = document.getElementById("status-box");
        const circle = document.getElementById("color-circle");
        const sync = document.getElementById("sync-time");

        // 1. Update Tampilan Fase
        let teks = "KOSONG";
        let kelas = "f0";

        if (kode === 1) { teks = "VEGETATIF"; kelas = "f1"; }
        else if (kode === 2) { teks = "REPRODUKTIF"; kelas = "f2"; }
        else if (kode === 3) { teks = "PEMATANGAN"; kelas = "f3"; }
        else if (kode === -1) { teks = "ANOMALI"; kelas = "ferr"; }

        box.innerText = teks;
        box.className = kelas;

        // 2. Update Warna dari Sensor TCS34725
        circle.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

        // 3. Waktu Update
        sync.innerText = "Terakhir Update: " + new Date().toLocaleTimeString();
    }

    // Jalankan setiap 2 detik
    setInterval(fetchData, 2000);
    fetchData(); // Panggilan pertama
</script>

</body>
</html>
