<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard IoT Padi - PENS</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; padding: 20px; flex-wrap: wrap; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 180px; border-top: 4px solid #4CAF50; }
        .chart-container { width: 80%; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .val { font-size: 2em; font-weight: bold; display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>MONITORING DAYA PADI (MATCH AVO)</h1>
    
    <div class="grid">
        <div class="card">TEGANGAN<span class="val" id="v">--</span>V</div>
        <div class="card">ARUS<span class="val" id="i" style="color:#2196F3">--</span>mA</div>
        <div class="card">BATERAI<span class="val" id="p" style="color:#4CAF50">--</span>%</div>
        <div class="card">SUHU CPU<span class="val" id="s" style="color:#ff9800">--</span>°C</div>
    </div>

    <div class="chart-container">
        <canvas id="voltChart"></canvas>
    </div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring",
            bucket: "monitoring_padi"
        };

        const queryApi = new inject.InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);
        
        // Setup Chart.js
        const ctx = document.getElementById('voltChart').getContext('2d');
        const voltChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Tegangan Baterai (V)', data: [], borderColor: '#4CAF50', tension: 0.3 }] },
            options: { scales: { y: { beginAtZero: false, grid: {color: '#333'} }, x: { grid: {color: '#333'} } } }
        });

        async function update() {
            const flux = `from(bucket: "${conf.bucket}") |> range(start: -1h) |> filter(fn: (r) => r._measurement == "power_analytics")`;
            
            let lastData = {};
            let historyV = [];
            let labels = [];

            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    if (o._field === "voltase") {
                        historyV.push(o._value);
                        labels.push(new Date(o._time).toLocaleTimeString());
                    }
                    lastData[o._field] = o._value;
                },
                error(e) { console.error(e); },
                complete() {
                    if (lastData.voltase) {
                        document.getElementById('v').innerText = lastData.voltase.toFixed(2);
                        document.getElementById('i').innerText = lastData.arus_ma.toFixed(1);
                        document.getElementById('p').innerText = Math.round(lastData.persen);
                        document.getElementById('s').innerText = lastData.suhu_cpu.toFixed(1);
                        
                        // Update Chart
                        voltChart.data.labels = labels;
                        voltChart.data.datasets[0].data = historyV;
                        voltChart.update('none');
                    }
                }
            });
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
