<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padi Monitoring Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #eee; margin: 0; padding: 15px; }
        .header { text-align: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; border-left: 5px solid #00ff41; }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .val { font-size: 1.8rem; font-weight: bold; margin: 10px 0; display: block; color: #fff; }
        .unit { font-size: 0.9rem; color: #555; }
        .chart-box { background: #1a1a1a; margin-top: 20px; padding: 15px; border-radius: 15px; height: 300px; }
        #status-msg { font-size: 0.7rem; color: #444; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 1.4rem;">PADI IOT MONITOR</h1>
        <div id="status-msg">Menghubungkan ke Cloud...</div>
    </div>

    <div class="grid">
        <div class="card"><div class="label">Tegangan</div><span class="val" id="v">--</span><span class="unit">VOLT</span></div>
        <div class="card"><div class="label">Arus</div><span class="val" id="i" style="color: #2196f3;">--</span><span class="unit">mA</span></div>
        <div class="card"><div class="label">Baterai</div><span class="val" id="p" style="color: #ff9800;">--</span><span class="unit">%</span></div>
        <div class="card"><div class="label">Suhu CPU</div><span class="val" id="s" style="color: #f44336;">--</span><span class="unit">°C</span></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring", bucket: "monitoring_padi"
        };

        const { InfluxDB } = window['@influxdata/influxdb-client'];
        const queryApi = new InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);

        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Arus (mA)', data: [], borderColor: '#2196f3', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(33, 150, 243, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#222' } } } }
        });

        function refresh() {
            const flux = `from(bucket: "${conf.bucket}") |> range(start: -1h) |> filter(fn: (r) => r._measurement == "padi_sensor")`;
            let last = {}, labs = [], dArus = [];

            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    if (o._field === "arus_ma") { labs.push(""); dArus.push(o._value); }
                    last[o._field] = o._value;
                },
                complete() {
                    if (last.voltase) {
                        document.getElementById('v').innerText = last.voltase.toFixed(2);
                        document.getElementById('i').innerText = last.arus_ma.toFixed(1);
                        document.getElementById('p').innerText = Math.round(last.persen);
                        document.getElementById('s').innerText = last.suhu_cpu.toFixed(1);
                        
                        chart.data.labels = labs.slice(-40);
                        chart.data.datasets[0].data = dArus.slice(-40);
                        chart.update('none');
                        document.getElementById('status-msg').innerText = "Update: " + new Date().toLocaleTimeString();
                    }
                }
            });
        }

        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>
