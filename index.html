<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Padi - PENS</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 15px; width: 200px; border-bottom: 5px solid #4CAF50; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        h1 { color: #4CAF50; margin-top: 30px; }
        .value { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .unit { font-size: 0.5em; color: #aaa; }
        .status-on { color: #4CAF50; }
        .status-off { color: #f44336; }
    </style>
</head>
<body>

    <h1>SISTEM MONITORING PADI (PENS)</h1>
    <p>Data Real-time dari Cloud InfluxDB</p>

    <div class="container">
        <div class="card">
            <div>TEGANGAN</div>
            <div class="value" id="voltase">-- <span class="unit">V</span></div>
        </div>

        <div class="card">
            <div>ARUS</div>
            <div class="value" id="arus">-- <span class="unit">mA</span></div>
        </div>

        <div class="card" style="border-bottom-color: #2196F3;">
            <div>BATERAI</div>
            <div class="value" id="persen">-- <span class="unit">%</span></div>
        </div>

        <div class="card" style="border-bottom-color: #ff9800;">
            <div>SUHU CPU</div>
            <div class="value" id="suhu">-- <span class="unit">°C</span></div>
        </div>
    </div>

    <div id="last-update" style="margin-top: 20px; color: #666;">Menghubungkan ke server...</div>

    <script>
        // --- KONFIGURASI INFLUXDB ---
        const url = "https://us-east-1-1.aws.cloud2.influxdata.com";
        const token = "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==";
        const org = "Monitoring";
        const bucket = "monitoring_padi";

        const {InfluxDB} = window['@influxdata/influxdb-client'];
        const queryApi = new InfluxDB({url, token}).getQueryApi(org);

        function updateDashboard() {
            // Query untuk mengambil data terakhir dari measurement 'power_system'
            const fluxQuery = `
                from(bucket: "${bucket}")
                |> range(start: -1h)
                |> filter(fn: (r) => r["_measurement"] == "power_system")
                |> last()
            `;

            let data = {};

            queryApi.queryRows(fluxQuery, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    data[o._field] = o._value;
                },
                error(error) {
                    console.error(error);
                    document.getElementById('last-update').innerText = "Koneksi Error!";
                },
                complete() {
                    // Update tampilan HTML
                    if (data.voltase) document.getElementById('voltase').innerHTML = `${data.voltase.toFixed(2)} <span class="unit">V</span>`;
                    if (data.arus_ma) document.getElementById('arus').innerHTML = `${data.arus_ma.toFixed(1)} <span class="unit">mA</span>`;
                    if (data.persen_bat) document.getElementById('persen').innerHTML = `${Math.round(data.persen_bat)} <span class="unit">%</span>`;
                    if (data.suhu_cpu) document.getElementById('suhu').innerHTML = `${data.suhu_cpu.toFixed(1)} <span class="unit">°C</span>`;
                    
                    document.getElementById('last-update').innerText = "Terakhir diperbarui: " + new Date().toLocaleTimeString();
                },
            });
        }

        // Jalankan update setiap 5 detik
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
