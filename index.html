<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rice - IoT Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #2c3e50; --accent: #27ae60; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #ecf0f1; --accent: #2ecc71; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.4s; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 35px 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        .page { display: none; }
        .active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Status Card */
        #status-box { width: 100%; min-height: 180px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: #fff; margin: 25px 0; transition: 0.5s; box-shadow: inset 0 0 20px rgba(0,0,0,0.1); }
        .f-0 { background: #95a5a6; } /* Kosong */
        .f-1 { background: #27ae60; } /* Fase 1 */
        .f-2 { background: #2ecc71; } /* Fase 2 */
        .f-3 { background: #f1c40f; color: #2c3e50 !important; } /* Fase 3 */
        .f-err { background: #e74c3c; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.8; } }

        /* Buttons */
        button { cursor: pointer; border: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-start { background: var(--accent); color: #fff; padding: 15px 40px; font-size: 18px; margin-top: 10px; width: 100%; }
        .btn-theme { position: absolute; top: 15px; right: 15px; background: #34495e; color: #fff; padding: 8px 12px; font-size: 14px; }
        .btn-back { background: none; border: 1px solid var(--text); color: var(--text); padding: 8px 20px; margin-top: 20px; font-size: 12px; }
        
        #sync-info { font-size: 11px; opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-theme" id="theme-btn">🌙 Gelap</button>

    <div id="p-home" class="page active">
        <div style="font-size: 70px; margin-bottom: 10px;">🌾</div>
        <h1 style="margin: 0; font-size: 28px;">Smart Rice</h1>
        <p style="opacity: 0.7; font-size: 14px;">Monitoring Fase Pertumbuhan Padi</p>
        <button class="btn-start" onclick="showPage('p-dash')">Masuk Dashboard</button>
    </div>

    <div id="p-dash" class="page">
        <h2 style="margin: 0;">Status Real-Time</h2>
        <div id="status-box" class="f-0">MEMUAT DATA...</div>
        <div id="sync-info">Menghubungkan ke Cloud...</div>
        <button class="btn-back" onclick="showPage('p-home')">← Kembali</button>
    </div>
</div>

<script>
    // --- 1. KONFIGURASI (WAJIB ISI BENAR) ---
    const CFG = {
        url: "https://us-east-1-1.aws.cloud2.influxdata.com", 
        token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
        org: "Monitoring",
        bucket: "monitoring_padi"
    };

    // --- 2. LOGIKA HALAMAN & TEMA (D3.js) ---
    function showPage(id) {
        d3.selectAll(".page").classed("active", false);
        d3.select("#" + id).classed("active", true);
    }

    let isDark = false;
    d3.select("#theme-btn").on("click", function() {
        isDark = !isDark;
        d3.select("body").attr("data-theme", isDark ? "dark" : null);
        d3.select(this).text(isDark ? "☀️ Terang" : "🌙 Gelap");
    });

    // --- 3. AMBIL DATA DARI INFLUXDB ---
    async function updateDashboard() {
        // Query mencari data 24 jam terakhir agar tidak stuck jika ada beda jam
        const fluxQuery = `
            from(bucket: "${CFG.bucket}")
            |> range(start: -24h)
            |> filter(fn: (r) => r._measurement == "pertumbuhan_padi")
            |> filter(fn: (r) => r._field == "kode_fase")
            |> last()
        `;

        try {
            const response = await fetch(`${CFG.url}/api/v2/query?org=${CFG.org}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Token ${CFG.token}`,
                    'Content-Type': 'application/vnd.flux',
                    'Accept': 'application/csv'
                },
                body: fluxQuery
            });

            if (!response.ok) throw new Error("Koneksi Cloud Gagal");

            const csvData = await response.text();
            const lines = csvData.trim().split('\n');

            if (lines.length > 1) {
                // Ambil nilai dari kolom _value (biasanya kolom ke-6 atau ke-7 di InfluxDB CSV)
                const headers = lines[0].split(',');
                const valIdx = headers.indexOf('_value');
                const lastLine = lines[lines.length - 1].split(',');
                const kode = parseInt(lastLine[valIdx]);
                
                renderStatus(kode);
            } else {
                d3.select("#sync-info").text("Belum ada data di Bucket");
            }
        } catch (err) {
            d3.select("#sync-info").text("Error: " + err.message);
        }
    }

    function renderStatus(k) {
        const box = d3.select("#status-box");
        d3.select("#sync-info").text("Terakhir Update: " + new Date().toLocaleTimeString());

        if (k === 1) box.text("VEGETATIF").attr("class", "f-1");
        else if (k === 2) box.text("REPRODUKTIF").attr("class", "f-2");
        else if (k === 3) box.text("PEMATANGAN").attr("class", "f-3");
        else if (k === -1) box.text("⚠️ ANOMALI").attr("class", "f-err");
        else if (k === 0) box.text("KOSONG").attr("class", "f-0");
    }

    // Jalankan pooling data setiap 2 detik
    setInterval(updateDashboard, 2000);
    updateDashboard();

</script>
</body>
</html>
