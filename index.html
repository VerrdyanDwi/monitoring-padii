<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rice Monitoring</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #fff; --text: #2c3e50; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #eee; }
        
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #status-box { width: 100%; min-height: 150px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: #fff; margin: 20px 0; transition: 0.5s; }
        .f-0 { background: #95a5a6; } .f-1 { background: #27ae60; } .f-2 { background: #2ecc71; } .f-3 { background: #f1c40f; color: #2c3e50 !important; } .f-err { background: #e74c3c; }
        
        button { cursor: pointer; border: none; border-radius: 50px; transition: 0.2s; }
        .btn-start { background: #27ae60; color: #fff; padding: 15px 30px; font-size: 18px; margin-top: 20px; }
        .btn-theme { position: absolute; top: 15px; right: 15px; background: #34495e; color: #fff; padding: 5px 10px; }
        .btn-back { background: none; border: 1px solid var(--text); color: var(--text); padding: 8px 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-theme" onclick="toggleTheme()">🌙</button>

    <div id="p-home" class="page active">
        <div style="font-size: 60px;">🌾</div>
        <h1>Smart Rice</h1>
        <p>Monitoring Pertumbuhan Real-Time</p>
        <button class="btn-start" onclick="showPage('p-dash')">Mulai Pantau</button>
    </div>

    <div id="p-dash" class="page">
        <h2>Status Padi</h2>
        <div id="status-box" class="f-0">MENUNGGU DATA...</div>
        <div id="sync" style="font-size: 11px; opacity: 0.6;">-</div>
        <button class="btn-back" onclick="showPage('p-home')">Kembali</button>
    </div>
</div>

<script>
    const CFG = {
        url: "https://us-east-1-1.aws.cloud2.influxdata.com",
        token: "MASUKKAN_TOKEN_ASLIMU",
        org: "Monitoring",
        bucket: "NAMA_BUCKET_MU"
    };

    function showPage(id) { d3.selectAll(".page").classed("active", false); d3.select("#"+id).classed("active", true); }
    
    function toggleTheme() {
        const b = d3.select("body");
        const isDark = b.attr("data-theme") === "dark";
        b.attr("data-theme", isDark ? null : "dark");
        d3.select(".btn-theme").text(isDark ? "🌙" : "☀️");
    }

    async function getData() {
        // Query ditingkatkan agar mengambil data paling baru (5 menit terakhir)
        const flux = `from(bucket:"${CFG.bucket}") |> range(start: -5m) |> filter(fn: (r) => r._measurement == "pertumbuhan_padi") |> last()`;
        try {
            const res = await fetch(`${CFG.url}/api/v2/query?org=${CFG.org}`, {
                method: 'POST',
                headers: {'Authorization': `Token ${CFG.token}`, 'Content-Type': 'application/vnd.flux'},
                body: flux
            });
            const csv = await res.text();
            const lines = csv.trim().split('\n');
            if(lines.length > 1) {
                const val = parseInt(lines[lines.length-1].split(',').find(v => ["-1","0","1","2","3"].includes(v.trim())));
                updateUI(val);
            }
        } catch(e) { console.error(e); }
    }

    function updateUI(k) {
        const box = d3.select("#status-box");
        d3.select("#sync").text("Update: " + new Date().toLocaleTimeString());
        if(k===1) box.text("VEGETATIF").attr("class", "f-1");
        else if(k===2) box.text("REPRODUKTIF").attr("class", "f-2");
        else if(k===3) box.text("PEMATANGAN").attr("class", "f-3");
        else if(k===-1) box.text("⚠️ ANOMALI").attr("class", "f-err");
        else box.text("KOSONG").attr("class", "f-0");
    }

    setInterval(getData, 2000);
</script>
</body>
</html>
