<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padi Monitoring - Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border-top: 4px solid #4CAF50; text-align: center; }
        .val { font-size: 1.5em; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.7em; color: #888; text-transform: uppercase; }
        .chart-container { background: #1e1e1e; margin-top: 20px; padding: 10px; border-radius: 10px; height: 250px; }
        #status { font-size: 0.7em; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <h3 style="text-align: center; color: #4CAF50; margin: 0;">IOT PADI - FERDI PENS</h3>
    <div id="status">Menghubungkan...</div>

    <div class="grid">
        <div class="card"><span class="label">Tegangan</span><span class="val" id="v">--</span></div>
        <div class="card" style="border-top-color:#2196F3"><span class="label">Arus (mA)</span><span class="val" id="i" style="color:#2196F3">--</span></div>
        <div class="card" style="border-top-color:#ff9800"><span class="label">Baterai</span><span class="val" id="p" style="color:#ff9800">--</span></div>
        <div class="card" style="border-top-color:#9c27b0"><span class="label">Suhu Pi</span><span class="val" id="s" style="color:#9c27b0">--</span></div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring",
            bucket: "monitoring_padi"
        };

        const queryApi = new inject.InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);
        
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Voltase', data: [], borderColor: '#4CAF50', tension: 0.3, fill: true, backgroundColor: 'rgba(76,175,80,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' } }, x: { grid: { color: '#333' } } } }
        });

        function update() {
            // Ambil data 24 jam terakhir karena interval 10 menit butuh rentang lebar
            const flux = `from(bucket: "${conf.bucket}") |> range(start: -24h) |> filter(fn: (r) => r._measurement == "power_final")`;
            let latest = {};
            let historyV = [];
            let labels = [];

            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    if (o._field === "voltase") {
                        labels.push(new Date(o._time).getHours() + ":" + String(new Date(o._time).getMinutes()).padStart(2, '0'));
                        historyV.push(o._value);
                    }
                    latest[o._field] = o._value;
                },
                complete() {
                    if (latest.voltase) {
                        document.getElementById('v').innerText = latest.voltase.toFixed(2) + "V";
                        document.getElementById('i').innerText = Math.round(latest.arus_ma);
                        document.getElementById('p').innerText = Math.round(latest.persen) + "%";
                        document.getElementById('s').innerText = Math.round(latest.suhu_cpu) + "°C";
                        
                        myChart.data.labels = labels.slice(-24); // Tampilkan 24 data terakhir (4 jam pemantauan)
                        myChart.data.datasets[0].data = historyV.slice(-24);
                        myChart.update();
                        document.getElementById('status').innerText = "Update: " + new Date().toLocaleTimeString();
                    }
                }
            });
        }

        setInterval(update, 30000); // Web cek data tiap 30 detik
        update();
    </script>
</body>
</html>
