<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suhu Pi Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; border-bottom: 4px solid #ff5722; display: inline-block; min-width: 250px; }
        .val { font-size: 3em; font-weight: bold; color: #ff5722; }
        .chart-box { max-width: 600px; margin: 20px auto; background: #1e1e1e; padding: 15px; border-radius: 15px; height: 300px; }
    </style>
</head>
<body>
    <h2>RASPBERRY PI TEMPERATURE</h2>
    <div class="card">
        <div style="font-size: 0.8em; color: #888;">SUHU CPU</div>
        <div class="val" id="t">--</div>
        <div style="font-size: 1.2em;">°C</div>
    </div>
    <div class="chart-box"><canvas id="c"></canvas></div>
    <div id="st" style="font-size: 0.7em; color: #444;">Menghubungkan...</div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring", bucket: "monitoring_padi"
        };
        const { InfluxDB } = window['@influxdata/influxdb-client'];
        const queryApi = new InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);
        
        const chart = new Chart(document.getElementById('c'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#ff5722', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(255,87,34,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#333' } } } }
        });

        function update() {
            const flux = `from(bucket: "${conf.bucket}") |> range(start: -3h) |> filter(fn: (r) => r._measurement == "cpu_temp_monitor")`;
            let last = 0, data = [], labs = [];
            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    labs.push(""); data.push(o._value); last = o._value;
                },
                complete() {
                    if(last > 0) {
                        document.getElementById('t').innerText = last.toFixed(1);
                        chart.data.labels = labs; chart.data.datasets[0].data = data;
                        chart.update();
                        document.getElementById('st').innerText = "Last Update: " + new Date().toLocaleTimeString();
                    }
                }
            });
        }
        setInterval(update, 30000); update();
    </script>
</body>
</html>

    <div class="grid">
        <div class="card">
            <span class="label">TEGANGAN</span>
            <span class="val" id="v">--</span><span class="unit">VOLT</span>
        </div>
        <div class="card">
            <span class="label">ARUS</span>
            <span class="val" id="i" style="color: #2196F3;">--</span><span class="unit">mA</span>
        </div>
        <div class="card">
            <span class="label">DAYA</span>
            <span class="val" id="w" style="color: #ff9800;">--</span><span class="unit">WATT</span>
        </div>
        <div class="card">
            <span class="label">BATERAI</span>
            <span class="val" id="p" style="color: var(--neon);">--</span><span class="unit">PERSEN</span>
        </div>
    </div>

    <div class="chart-box">
        <h3>Grafik Riwayat Voltase (V)</h3>
        <canvas id="voltChart"></canvas>
    </div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring", 
            bucket: "monitoring_padi"
        };

        const { InfluxDB } = window['@influxdata/influxdb-client'];
        const queryApi = new InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);

        // Setup Chart untuk Voltase
        const ctx = document.getElementById('voltChart').getContext('2d');
        const voltChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    label: 'Voltase (V)', 
                    data: [], 
                    borderColor: '#00FF41', 
                    borderWidth: 2, 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: 'rgba(0, 255, 65, 0.1)', 
                    pointRadius: 0 
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        grid: {color:'#222'}, 
                        ticks: {color: '#555'},
                        // Opsional: atur min/max biar grafik nggak terlalu lompat
                        // min: 9, max: 13 
                    }, 
                    x: { display: false } 
                } 
            }
        });

        function updateData() {
            // Ambil data 15 menit terakhir dari measurement 'power_padi'
            const flux = `from(bucket: "${conf.bucket}") 
                          |> range(start: -15m) 
                          |> filter(fn: (r) => r._measurement == "power_padi")`;
            
            let latest = {}, labels = [], dataVolt = [];

            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    if (o._field === "voltase") {
                        labels.push(""); // Tanpa label teks biar rapi
                        dataVolt.push(o._value);
                    }
                    latest[o._field] = o._value;
                },
                complete() {
                    if (latest.voltase) {
                        // Update angka di Card
                        document.getElementById('v').innerText = latest.voltase.toFixed(2);
                        document.getElementById('i').innerText = latest.arus_ma.toFixed(1);
                        document.getElementById('w').innerText = latest.watt.toFixed(2);
                        document.getElementById('p').innerText = Math.round(latest.persen);
                        
                        // Update Grafik Voltase (tampilkan 50 titik terakhir)
                        voltChart.data.labels = labels.slice(-50);
                        voltChart.data.datasets[0].data = dataVolt.slice(-50);
                        voltChart.update('none'); // 'none' biar gak berat animasinya
                        
                        document.getElementById('status').innerText = "LIVE | " + new Date().toLocaleTimeString();
                    }
                },
                error(e) {
                    console.error(e);
                    document.getElementById('status').innerText = "Koneksi Bermasalah!";
                }
            });
        }

        // Jalankan setiap 2 detik sesuai pengiriman Python
        setInterval(updateData, 2000);
        updateData();
    </script>
</body>
</html>
