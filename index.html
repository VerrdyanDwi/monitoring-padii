<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Padi Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: #1e1e1e; padding: 12px; border-radius: 8px; text-align: center; border-top: 3px solid #4CAF50; }
        .label { font-size: 0.65em; color: #888; text-transform: uppercase; }
        .val { font-size: 1.3em; font-weight: bold; display: block; margin-top: 4px; }
        .chart-box { background: #1e1e1e; margin-top: 15px; padding: 10px; border-radius: 8px; height: 180px; }
        h4 { margin: 15px 0 5px 5px; color: #4CAF50; font-size: 0.9em; }
    </style>
</head>
<body>
    <h3 style="text-align: center; margin: 5px 0;">PADI MONITORING PRO</h3>

    <div class="grid">
        <div class="card"><span class="label">Voltase</span><span class="val" id="v">--</span></div>
        <div class="card" style="border-top-color:#2196F3"><span class="label">Arus (mA)</span><span class="val" id="i" style="color:#2196F3">--</span></div>
        <div class="card" style="border-top-color:#ff9800"><span class="label">Baterai</span><span class="val" id="p" style="color:#ff9800">--</span></div>
        <div class="card" style="border-top-color:#9c27b0"><span class="label">Suhu CPU</span><span class="val" id="s" style="color:#9c27b0">--</span></div>
    </div>

    <h4>Tegangan Baterai (V)</h4>
    <div class="chart-box"><canvas id="voltChart"></canvas></div>

    <h4>Suhu CPU Raspberry Pi (°C)</h4>
    <div class="chart-box"><canvas id="tempChart"></canvas></div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring", bucket: "monitoring_padi"
        };
        const queryApi = new inject.InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);

        function createChart(id, color, label) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: color, tension: 0.3, fill: false, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#333' } }, x: { grid: { display: false } } } }
            });
        }

        const voltChart = createChart('voltChart', '#4CAF50');
        const tempChart = createChart('tempChart', '#9c27b0');

        function update() {
            const flux = `from(bucket: "${conf.bucket}") |> range(start: -6h) |> filter(fn: (r) => r._measurement == "power_pro")`;
            let latest = {}, vData = [], tData = [], labels = [];

            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    const time = new Date(o._time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    if (o._field === "voltase") { labels.push(time); vData.push(o._value); }
                    if (o._field === "suhu_cpu") { tData.push(o._value); }
                    latest[o._field] = o._value;
                },
                complete() {
                    if (latest.voltase) {
                        document.getElementById('v').innerText = latest.voltase.toFixed(2) + "V";
                        document.getElementById('i').innerText = Math.round(latest.arus_ma);
                        document.getElementById('p').innerText = Math.round(latest.persen) + "%";
                        document.getElementById('s').innerText = latest.suhu_cpu.toFixed(1) + "°C";
                        
                        voltChart.data.labels = labels.slice(-30);
                        voltChart.data.datasets[0].data = vData.slice(-30);
                        voltChart.update();

                        tempChart.data.labels = labels.slice(-30);
                        tempChart.data.datasets[0].data = tData.slice(-30);
                        tempChart.update();
                    }
                }
            });
        }
        setInterval(update, 30000); update();
    </script>
</body>
</html>
