<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voltase Monitor - Padi PENS</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00FF41; --bg: #0a0a0a; --card: #151515; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 15px; }
        h1 { font-size: 1.2rem; color: var(--neon); margin: 5px 0; letter-spacing: 1px; }
        
        /* Grid Hybrid untuk Mobile */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .val { font-size: 1.5rem; font-weight: bold; margin: 5px 0; display: block; }
        .unit { font-size: 0.6rem; color: var(--neon); }

        /* Box khusus Grafik */
        .chart-box { 
            background: var(--card); margin-top: 15px; padding: 10px; 
            border-radius: 8px; height: 280px; border: 1px solid #333; 
        }
        h3 { font-size: 0.8rem; color: var(--neon); margin: 0 0 10px 5px; text-transform: uppercase; }
        #status { font-size: 0.7rem; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LIVE VOLTAGE MONITOR</h1>
        <div id="status">Connecting to Cloud...</div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">TEGANGAN</span>
            <span class="val" id="v">--</span><span class="unit">VOLT</span>
        </div>
        <div class="card">
            <span class="label">ARUS</span>
            <span class="val" id="i" style="color: #2196F3;">--</span><span class="unit">mA</span>
        </div>
        <div class="card">
            <span class="label">DAYA</span>
            <span class="val" id="w" style="color: #ff9800;">--</span><span class="unit">WATT</span>
        </div>
        <div class="card">
            <span class="label">BATERAI</span>
            <span class="val" id="p" style="color: var(--neon);">--</span><span class="unit">PERSEN</span>
        </div>
    </div>

    <div class="chart-box">
        <h3>Grafik Riwayat Voltase (V)</h3>
        <canvas id="voltChart"></canvas>
    </div>

    <script>
        const conf = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring", 
            bucket: "monitoring_padi"
        };

        const { InfluxDB } = window['@influxdata/influxdb-client'];
        const queryApi = new InfluxDB({url: conf.url, token: conf.token}).getQueryApi(conf.org);

        // Setup Chart untuk Voltase
        const ctx = document.getElementById('voltChart').getContext('2d');
        const voltChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    label: 'Voltase (V)', 
                    data: [], 
                    borderColor: '#00FF41', 
                    borderWidth: 2, 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: 'rgba(0, 255, 65, 0.1)', 
                    pointRadius: 0 
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { 
                        grid: {color:'#222'}, 
                        ticks: {color: '#555'},
                        // Opsional: atur min/max biar grafik nggak terlalu lompat
                        // min: 9, max: 13 
                    }, 
                    x: { display: false } 
                } 
            }
        });

        function updateData() {
            // Ambil data 15 menit terakhir dari measurement 'power_padi'
            const flux = `from(bucket: "${conf.bucket}") 
                          |> range(start: -15m) 
                          |> filter(fn: (r) => r._measurement == "power_padi")`;
            
            let latest = {}, labels = [], dataVolt = [];

            queryApi.queryRows(flux, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    if (o._field === "voltase") {
                        labels.push(""); // Tanpa label teks biar rapi
                        dataVolt.push(o._value);
                    }
                    latest[o._field] = o._value;
                },
                complete() {
                    if (latest.voltase) {
                        // Update angka di Card
                        document.getElementById('v').innerText = latest.voltase.toFixed(2);
                        document.getElementById('i').innerText = latest.arus_ma.toFixed(1);
                        document.getElementById('w').innerText = latest.watt.toFixed(2);
                        document.getElementById('p').innerText = Math.round(latest.persen);
                        
                        // Update Grafik Voltase (tampilkan 50 titik terakhir)
                        voltChart.data.labels = labels.slice(-50);
                        voltChart.data.datasets[0].data = dataVolt.slice(-50);
                        voltChart.update('none'); // 'none' biar gak berat animasinya
                        
                        document.getElementById('status').innerText = "LIVE | " + new Date().toLocaleTimeString();
                    }
                },
                error(e) {
                    console.error(e);
                    document.getElementById('status').innerText = "Koneksi Bermasalah!";
                }
            });
        }

        // Jalankan setiap 2 detik sesuai pengiriman Python
        setInterval(updateData, 2000);
        updateData();
    </script>
</body>
</html>
