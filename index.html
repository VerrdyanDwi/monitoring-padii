<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Padi Fix - PENS</title>
    <script src="https://cdn.jsdelivr.net/npm/@influxdata/influxdb-client-browser/dist/index.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .header { margin-bottom: 30px; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        h1 { color: #4CAF50; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-top: 4px solid #4CAF50; }
        .label { font-size: 0.8em; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        .val { font-size: 2.5em; font-weight: bold; color: #fff; }
        .unit { font-size: 0.4em; color: #666; margin-left: 5px; }
        .chart-box { background: #1e1e1e; padding: 20px; border-radius: 12px; height: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #status-cloud { font-size: 0.9em; color: #ff9800; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>IOT MONITORING PADI - VERRDY PENS</h1>
        <div id="status-cloud">Menghubungkan ke InfluxDB Cloud...</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">Tegangan</div>
            <div class="val" id="v">--<span class="unit">V</span></div>
        </div>
        <div class="card" style="border-top-color: #2196F3;">
            <div class="label">Arus Sistem</div>
            <div class="val" id="i" style="color: #2196F3;">--<span class="unit">mA</span></div>
        </div>
        <div class="card" style="border-top-color: #ff9800;">
            <div class="label">Kapasitas Baterai</div>
            <div class="val" id="p" style="color: #ff9800;">--<span class="unit">%</span></div>
        </div>
        <div class="card" style="border-top-color: #9c27b0;">
            <div class="label">Suhu CPU Pi</div>
            <div class="val" id="s" style="color: #9c27b0;">--<span class="unit">°C</span></div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <script>
        // --- KONFIGURASI ---
        const INFLUX_CONFIG = {
            url: "https://us-east-1-1.aws.cloud2.influxdata.com",
            token: "ieRDXoPlxImCroRqKYzySuX1xBYVIW0HQa2bOjoPwYldMyNWaJ_bA1U6s9kL2nLpbbDs_1dXWO4sCQI2CuIEMA==",
            org: "Monitoring",
            bucket: "monitoring_padi"
        };

        const { InfluxDB } = window['@influxdata/influxdb-client'];
        const queryApi = new InfluxDB({ url: INFLUX_CONFIG.url, token: INFLUX_CONFIG.token }).getQueryApi(INFLUX_CONFIG.org);

        // --- SETUP CHART ---
        const ctx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Tren Tegangan (V)',
                    data: [],
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#888' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#888' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });

        async function fetchData() {
            // Mengambil data 24 jam terakhir agar pasti muncul meski ada perbedaan jam
            const fluxQuery = `
                from(bucket: "${INFLUX_CONFIG.bucket}")
                |> range(start: -24h)
                |> filter(fn: (r) => r["_measurement"] == "power_analytics")
            `;

            let labels = [];
            let voltages = [];
            let latest = {};

            queryApi.queryRows(fluxQuery, {
                next(row, tableMeta) {
                    const o = tableMeta.toObject(row);
                    
                    if (o._field === "voltase") {
                        labels.push(new Date(o._time).toLocaleTimeString());
                        voltages.push(o._value);
                    }
                    latest[o._field] = o._value;
                },
                error(error) {
                    console.error(error);
                    document.getElementById('status-cloud').innerText = "❌ ERROR: Gagal mengambil data!";
                },
                complete() {
                    if (Object.keys(latest).length > 0) {
                        // Update Angka
                        if (latest.voltase) document.getElementById('v').innerHTML = latest.voltase.toFixed(2) + '<span class="unit">V</span>';
                        if (latest.arus_ma) document.getElementById('i').innerHTML = latest.arus_ma.toFixed(1) + '<span class="unit">mA</span>';
                        if (latest.persen) document.getElementById('p').innerHTML = Math.round(latest.persen) + '<span class="unit">%</span>';
                        if (latest.suhu_cpu) document.getElementById('s').innerHTML = latest.suhu_cpu.toFixed(1) + '<span class="unit">°C</span>';
                        
                        // Update Grafik (Batasi 20 data terakhir agar tidak sesak)
                        mainChart.data.labels = labels.slice(-20);
                        mainChart.data.datasets[0].data = voltages.slice(-20);
                        mainChart.update();

                        document.getElementById('status-cloud').innerText = "✅ Terhubung - Update: " + new Date().toLocaleTimeString();
                    } else {
                        document.getElementById('status-cloud').innerText = "⚠️ Data Kosong di Cloud (Cek Program Python!)";
                    }
                }
            });
        }

        // Jalankan update tiap 5 detik
        setInterval(fetchData, 5000);
        fetchData();
    </script>
</body>
</html>
